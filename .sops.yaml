# SOPS configuration for ABA secrets
# To set up:
#   1. Generate an age key: age-keygen -o ~/.config/sops/age/keys.txt
#   2. Add the public key below
#   3. Create secrets: sops secrets/api-keys.yaml
#   4. For the server: generate a separate age key and add its public key here
#
# Keys listed here can decrypt secrets in this repo.
keys:
  # Add your age public keys here (one per machine/person):
  # - &dev age1abc123...
  # - &server age1xyz789...
creation_rules:
  - path_regex: secrets/.*\.(yaml|json|env)$
    key_groups:
      - age: []
        # Uncomment and add your keys:
        # - *dev
        # - *server
